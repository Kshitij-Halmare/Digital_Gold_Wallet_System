name: Java CI - Test with MySQL, Build & Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  build-test-package:
    name: Run Tests on Real MySQL → Build JAR → Upload
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: digital_gold_wallet_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      # 1. Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Cache Maven dependencies
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4. Wait for MySQL to be fully ready
      - name: Wait for MySQL to be Ready
        run: |
          echo "Waiting for MySQL to accept connections..."
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u testuser -ptestpass --silent; do
            echo "  still waiting..."
            sleep 3
          done
          echo "MySQL is ready!"

      # 5. Verify MySQL DB exists and is accessible
      - name: Verify MySQL Database
        run: |
          mysql -h 127.0.0.1 -P 3306 -u testuser -ptestpass -e "SHOW DATABASES;"
          mysql -h 127.0.0.1 -P 3306 -u testuser -ptestpass -e "USE digital_gold_wallet_test; SHOW TABLES;"

      # 6. ✅ RUN ALL TEST CASES
      #    - DO NOT use -DskipTests here, ever
      #    - maven-surefire-plugin will print PASS/FAIL for every test method
      #    - create-drop: Hibernate creates all entity tables before tests,
      #      drops them all after Spring context closes
      - name: ✅ Run ALL Test Cases
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/digital_gold_wallet_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect
          SPRING_JPA_SHOW_SQL: "true"
        run: |
          echo "=========================================="
          echo "  STARTING TEST EXECUTION"
          echo "=========================================="
          mvn test \
            --no-transfer-progress \
            -Dsurefire.printSummary=true \
            -Dsurefire.failIfNoSpecifiedTests=false
          echo "=========================================="
          echo "  TEST EXECUTION COMPLETE"
          echo "=========================================="

      # 7. Print test summary directly in the logs
      - name: Print Test Results Summary
        if: always()
        run: |
          echo "=========================================="
          echo "  TEST RESULTS SUMMARY"
          echo "=========================================="
          # Print each surefire .txt report (shows PASSED/FAILED per test)
          if [ -d target/surefire-reports ]; then
            for report in target/surefire-reports/*.txt; do
              echo "--- $report ---"
              cat "$report"
              echo ""
            done
          else
            echo "No surefire reports found - tests may not have run!"
          fi

      # 8. Upload full surefire XML + TXT reports as artifact
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 14

      # 9. Show which tables Hibernate created and then dropped
      - name: Check DB After Tests (should be empty - create-drop worked)
        if: always()
        run: |
          echo "Tables remaining after tests (should be empty due to create-drop):"
          mysql -h 127.0.0.1 -P 3306 -u testuser -ptestpass \
            -e "USE digital_gold_wallet_test; SHOW TABLES;"

      # 10. Build JAR only after all tests pass
      #     -DskipTests is ONLY here because tests already ran in step 6
      - name: Build JAR (tests already verified above)
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/digital_gold_wallet_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
          SPRING_DATASOURCE_USERNAME: testuser
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
        run: |
          mvn package -DskipTests --no-transfer-progress
          echo "JAR built successfully:"
          ls -lh target/*.jar

      # 11. Upload JAR artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: digital-gold-wallet-${{ github.run_number }}
          path: target/*.jar
          retention-days: 30